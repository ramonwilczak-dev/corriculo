<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projetos | Ramon Wilczak</title>
    
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }
        
        .container {
            max-width: 1080px;
            margin: 0 auto;
            background: white;
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }
        
        h1 { color: var(--dark); font-size: 2.8rem; margin-bottom: 8px; }
        #subtitle { font-size: 1.25rem; color: #64748b; margin-bottom: 40px; }
        
        .project {
            margin-bottom: 30px;
            padding: 28px;
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            transition: all 0.3s;
        }
        
        .project:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
        }
        
        .project h3 { color: var(--primary); font-size: 1.4rem; margin-bottom: 12px; }
        
        .back {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">Meus Projetos</h1>
        <p id="subtitle"></p>

        <div id="projectsList"></div>

        <a href="index.html" class="back">← Voltar ao Currículo</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const skill = params.get('skill') || 'Todos';

        document.getElementById('title').textContent = `Projetos em ${skill}`;

        const projects = {
            "HTML5": [
                { name: "Landing Page Moderna", desc: "Página de vendas responsiva para uma startup fictícia." },
                { name: "Portfolio Pessoal", desc: "Site completo com animações e seções interativas." }
            ],
            "CSS3": [
                { name: "Dashboard UI", desc: "Interface administrativa com tema escuro e claro." },
                { name: "E-commerce Layout", desc: "Loja online completa com grid avançado." }
            ],
            "JavaScript": [
                { name: "To-Do List Avançada", desc: "Aplicação com drag & drop, filtro e armazenamento local." },
                { name: "Calculadora Financeira", desc: "Simulador de investimentos com gráficos." }
            ],
            "GitHub": [
                { name: "Controle de Versionamento", desc: "Repositório completo com branches e Pull Requests simulados." },
                { name: "Colaboração em Equipe", desc: "Projeto open-source com 5 contribuidores." }
            ],
            "Python": [
                { name: "Bot de Telegram", desc: "Assistente virtual para agendamento de consultas." },
                { name: "Analisador de Dados", desc: "Script que processa planilhas e gera relatórios." }
            ],
            "Responsividade": [
                { name: "App Mobile First", desc: "Aplicação que se adapta perfeitamente do celular ao desktop." },
                { name: "Site de Notícias", desc: "Portal responsivo com menu hambúrguer e cards." }
            ]
        };

        const selected = projects[skill] || Object.values(projects).flat();

        const list = document.getElementById('projectsList');
        selected.forEach(p => {
            list.innerHTML += `
                <div class="project">
                    <h3>${p.name}</h3>
                    <p>${p.desc}</p>
                </div>`;
        });

        document.getElementById('subtitle').textContent = 
            `Aqui estão alguns projetos que desenvolvi na área de ${skill}.`;
    </script>
</body>
</html>
